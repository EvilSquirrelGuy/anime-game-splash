name: Fetch latest assets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 4'  # weekly auto-run (after update day)

jobs:
  fetch:
    name: Fetch assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install sharp tsx

      - name: Run fetcher script
        run: npx tsx index.ts

      - name: Update repo with new assets
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add assets/* || true
          git commit -m "update assets" || echo "no changes"
          git push
